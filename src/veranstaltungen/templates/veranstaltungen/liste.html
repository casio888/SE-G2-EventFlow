<!doctype html>
<html lang="de">
<head>
    <meta charset="utf-8">
    <title>Veranstaltungen</title>

    <!-- Bootstrap CSS laden -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="p-4">

<h1>Veranstaltungen</h1>

<a href="{% url 'veranstaltung_erstellen' %}" class="btn btn-primary mb-3">
    Neue Veranstaltung erstellen
</a>

<ul class="list-group">
    {% for event in events %}
        <li class="list-group-item d-flex justify-content-between align-items-center">
            <span>
                <strong>{{ event.titel }}</strong> – {{ event.ort }}
            </span>

            <a href="{% url 'veranstaltung_detail' event.id %}" class="btn btn-outline-secondary btn-sm">
                Details ansehen
            </a>
        </li>
    {% empty %}
        <li class="list-group-item">Keine Veranstaltungen vorhanden.</li>
    {% endfor %}
</ul>

</body>
</html>
