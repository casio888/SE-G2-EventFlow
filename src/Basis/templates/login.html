{% extends "base_topside.html" %}
{% load static %}

{% block extra_head %}
    <link rel="stylesheet" href="{% static 'css/index.css' %}">
    <link rel="stylesheet" href="{% static 'css/login.css' %}">
    <script src="{% static 'js/login.js' %}"></script>
{% endblock %}

{% block content %}
<!-- Login Maske -->
<main>
    <div class="login-card">
        <h1>Anmelden</h1>
        
        <!--Neue Fehlermeldung bei nichtexistenter Email Adresse oder falschem Passwort-->
        {% if error %}
            <div class="alert alert-danger" role="alert">
                {{ error }}
            </div>
        {% endif %}
        
        <form id="loginForm" action="#" method="POST">
            {% csrf_token %}
            <!-- E-Mail Feld -->
            <div class="form-group">
                <input type="email" name="email" class="form-input" placeholder="E-Mail Adresse" required>
            </div>
            
            <!-- Passwort Feld -->
            <div class="form-group">
                <input type="password" name="password" class="form-input" placeholder="Passwort" required>
            </div>
            
            <!-- Unterer Bereich: Link + Button -->
            <div class="card-footer">
                <a href="{% url 'Authentifizierung:Registrierung' %}" class="register-link">
                    Du hast noch keinen Account?<br>Dann erstelle dir einen!
                </a>
                <button type="submit" class="btn-submit">Anmelden</button>
            </div>
        </form>
    </div>
</main>
{% endblock %}
