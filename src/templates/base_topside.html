{% load static %}

<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EventFlow</title>
    <link rel="stylesheet" href="{% static 'css/nav.css' %}">
    {% block extra_head %}{% endblock %}
</head>
<body>
    <!-- Hero Bereich inklusive Navigation -->
    <header class="hero-section">
        <nav>
            <a href="{% url 'Basis:index' %}" class="logo">EventFlow</a>
            <div class="nav-links">
                <a href="#">Beliebt</a>
                <a href="#">Deine markierten Events</a>
                <a href="{% url 'veranstaltungen:veranstaltungen_your_events' %}">Deine Events</a>
            </div>
            <div class="auth-buttons">
                <a href="{% url 'Authentifizierung:Registrierung' %}" class="btn btn-signup">Registrieren</a>
                <a href="{% url 'Basis:login' %}" class="btn btn-login">Login</a>
            </div>
        </nav>
        {% block extra_header %} {% endblock %}
    </header>

    {% block content %}{% endblock %}

    <!-- Footer -->
    <footer>
        <div>
            <strong>EventFlow</strong><br>
            Dein persönlicher Event Manager<br>
            <small>Team G2 2026</small>
        </div>
        <div class="footer-links">
            <a href="#">Hilfe</a>
            <a href="#">FAQ</a>
            <a href="#">Impressum</a>
            <a href="#">Kontakt</a>
        </div>
    </footer>
    </body>
</html>
